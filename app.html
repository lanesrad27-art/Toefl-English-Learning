<!DOCTYPE html>
<html lang="en" data-font="md">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOEFL Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dark.css">
</head>
<body>
  <div class="app">
    <aside id="sidebar">
      <div class="sb-brand"><span class="logo">T</span> TOEFL Pro</div>
      <nav id="sbnav"></nav>
    </aside>
    <div class="main">
      <header class="topbar">
        <button id="menuBtn" aria-label="Menu">☰</button>
        <span class="crumb" id="crumb">Dashboard</span>
        <div class="topbar-spacer"></div>
        <div class="streak" title="Day streak">🔥 <span id="streakCount">0</span></div>
        <button class="icon-btn" id="eoToggle" title="English Only Mode">🇬🇧</button>
        <label class="sel-label" title="Font size">
          <select id="fontSel" aria-label="Font size">
            <option value="sm">A−</option>
            <option value="md" selected>A</option>
            <option value="lg">A+</option>
          </select>
        </label>
        <button class="icon-btn" id="themeToggle" title="Toggle dark mode">🌙</button>
        <div class="user-chip">
          <span class="avatar" id="userAvatar">U</span>
          <span id="userName">Guest</span>
          <button class="icon-btn" id="logoutBtn" title="Log out">⏻</button>
        </div>
      </header>
      <main id="view"></main>
    </div>
  </div>
  <div id="overlay"></div>
  <div id="toast"></div>
  <script>
    (function () {
      function showErr(msg) {
        var v = document.getElementById('view');
        if (!v) return;
        v.innerHTML =
          '<div style="padding:24px;max-width:760px;margin:0 auto">' +
          '<div style="background:#fdecea;border:1px solid #f5c6cb;color:#a11;border-radius:12px;padding:16px 18px">' +
          '<h3 style="margin:0 0 8px">⚠️ Aplikasi gagal dimuat</h3>' +
          '<pre style="white-space:pre-wrap;background:#fff;border:1px solid #eee;border-radius:8px;padding:10px;font-size:12px;color:#900;overflow:auto">' +
          String(msg).replace(/</g, '&lt;') +
          '</pre>' +
          '<p style="font-size:13px;color:#555;margin-top:10px">Kemungkinan ada file yang belum ter-upload ke GitHub, atau browser memuat versi lama. Coba hard refresh (Ctrl+Shift+R) atau buka Incognito.</p>' +
          '</div></div>';
      }
      window.addEventListener('error', function (e) {
        showErr((e.message || 'Error') + ' — ' + (e.filename || ''));
      });
      window.addEventListener('unhandledrejection', function (e) {
        var r = e && e.reason;
        showErr((r && (r.stack || r.message)) || String(r));
      });
      setTimeout(function () {
        var nav = document.getElementById('sbnav');
        if (nav && (!nav.innerHTML || nav.innerHTML.length < 20)) {
          showErr('app.js tidak berjalan: menu & dashboard tetap kosong setelah 4 detik. Buka Console (F12) dan cari pesan "Failed to load module" untuk tahu file mana yang hilang/salah.');
        }
      }, 4000);
    })();
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
